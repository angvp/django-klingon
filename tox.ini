[tox]
# Split into two lines (not one {py310-py314}-django{42,52,60} cross-product)
# because Django 6.0 requires Python >= 3.12. Kept in sync by hand with the
# `exclude:` list in .github/workflows/tests.yml — update both together.
envlist =
    {py310,py311,py312,py313,py314}-django{42,52}
    {py312,py313,py314}-django60

[testenv]
basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14

commands =
    coverage run --source klingon runtests.py --fast --create-db
setenv =
    PYTHONDONTWRITEBYTECODE=1
deps =
    -r{toxinidir}/requirements-test.txt
    django42: Django>=4.2,<5.0
    django52: Django>=5.2,<6.0
    django60: Django>=6.0,<6.1

passenv = GITHUB_*
